<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: #212529;
            background-color: #ffffff;
        }

        main {
            max-width: 1020px;
            margin: 48px auto;
            padding: 0 16px;
        }

        h1 {
            margin: 0 0 28px;
            font-size: 38px;
            font-weight: 700;
            color: #212529;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-size: 16px;
        }

        input {
            width: 100%;
            height: 44px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            padding: 0 12px;
            font-size: 16px;
            color: #212529;
            margin-bottom: 14px;
        }

        input:focus {
            outline: none;
            border-color: #86b7fe;
            box-shadow: 0 0 0 3px rgba(49, 124, 247, 0.2);
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }

        button {
            border: 1px solid transparent;
            border-radius: 4px;
            height: 38px;
            padding: 0 14px;
            font-size: 15px;
            cursor: pointer;
        }

        #reverseButton {
            background-color: #317cf7;
            color: #ffffff;
        }

        #copyButton {
            background-color: #6c757d;
            color: #ffffff;
            margin-top: 12px;
        }

        #result {
            min-height: 24px;
            margin: 0;
            color: #212529;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <main>
        <h1>Reverse String</h1>
        <label for="inputText">Introduce un texto</label>
        <input id="inputText" type="text" placeholder="Ejemplo: AI4Devs" />
        <div class="actions">
            <button id="reverseButton" type="button" hidden>🔄 Reverse String</button>
        </div>
        <p id="result"></p>
        <button id="copyButton" type="button" hidden>📋 Copy</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
